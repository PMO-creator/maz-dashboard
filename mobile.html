<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MAZ 2026 · Mobile</title>
<style>
  :root{
    --bg:#1E2E0D;--bg2:#2F4A18;--accent:#8AC43A;--accentD:#6BA030;
    --feito:#05C46B;--andam:#1A56FF;--atraso:#FF2525;
    --risco:#FF6B00;--iniciar:#5A6E85;--definir:#92400E;--cancel:#374151;
    --card:#FFFFFF;--surface:#EEF3E8;--text:#1E293B;--muted:#64748B;
    --border:#E2E8F0;--radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding-bottom:32px}

  /* HEADER */
  .header{background:var(--bg);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .header-logo{height:36px;border-radius:3px;flex-shrink:0}
  .header-title{flex:1}
  .header-title h1{font-size:17px;font-weight:800;color:#FFF;line-height:1.1}
  .header-title p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
  .btn-refresh-m{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#FFF;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .btn-refresh-m:disabled{opacity:.4}
  .refresh-time{font-size:10px;color:rgba(255,255,255,.4);text-align:right;flex-shrink:0;white-space:nowrap}

  /* STATUS BANNER */
  .status-banner{background:var(--bg2);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(138,196,58,.2)}
  .status-banner-label{font-size:11px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
  .status-banner-chip{font-size:13px;font-weight:800;padding:4px 12px;border-radius:20px;color:#FFF}

  /* KPI GRID */
  .kpi-section{padding:14px 12px 0}
  .kpi-hero{background:var(--bg2);border-radius:var(--radius);padding:18px 16px;text-align:center;margin-bottom:10px;border-left:4px solid var(--accent)}
  .kpi-hero-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:4px}
  .kpi-hero-val{font-size:56px;font-weight:900;color:var(--accent);line-height:1}
  .kpi-hero-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:6px}
  .kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .kpi-card{background:var(--card);border-radius:10px;padding:12px 14px;border-left:4px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .kpi-card-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:4px}
  .kpi-card-val{font-size:28px;font-weight:900;line-height:1}
  .kpi-card-sub{font-size:10px;color:var(--muted);margin-top:3px}

  /* TABS */
  .tabs{display:flex;gap:0;border-bottom:2px solid rgba(138,196,58,.3);background:var(--bg);padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-size:13px;font-weight:700;color:rgba(255,255,255,.55);padding:10px 14px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;flex-shrink:0}
  .tab.active{color:#FFF;border-bottom-color:var(--accent)}

  /* SECTION TITLE */
  .section{padding:12px 12px 0}
  .section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;padding-left:2px}

  /* EIXO CARDS (WBS) */
  .eixo-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .eixo-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;background:#6BA030}
  .eixo-id{font-size:15px;font-weight:800;color:#FFF;background:rgba(0,0,0,.2);padding:4px 10px;border-radius:6px;min-width:32px;text-align:center;flex-shrink:0}
  .eixo-name{font-size:14px;font-weight:700;color:#FFF;flex:1;line-height:1.2}
  .eixo-status{font-size:11px;font-weight:800;padding:4px 10px;border-radius:4px;color:#FFF;white-space:nowrap;flex-shrink:0}
  .eixo-chev{color:rgba(255,255,255,.7);font-size:12px;transition:transform .25s;flex-shrink:0}
  .eixo-body{overflow:hidden;transition:max-height .3s ease;max-height:0}
  .eixo-body.open{max-height:2000px}
  .grupo-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
  .grupo-row:last-child{border-bottom:none}
  .grupo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .grupo-info{flex:1;min-width:0}
  .grupo-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;word-break:break-word}
  .grupo-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
  .grupo-chip{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;color:#FFF;white-space:nowrap}
  .grupo-resp{font-size:10px;color:var(--muted);background:#F1F5F9;padding:2px 7px;border-radius:8px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}

  /* REQS */
  .req-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .req-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
  .req-num{font-size:13px;font-weight:800;color:var(--muted);min-width:36px}
  .req-info{flex:1;min-width:0}
  .req-desc{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;word-break:break-word}
  .req-comp{font-size:11px;color:var(--muted);margin-top:2px}
  .req-status-chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:10px;color:#FFF;white-space:nowrap;flex-shrink:0}
  .req-fin{font-size:10px;color:var(--muted);margin-top:2px}

  /* STATUS COLORS */
  .s-feito{background:var(--feito)}.s-andam{background:var(--andam)}
  .s-atraso{background:var(--atraso)}.s-risco{background:var(--risco)}
  .s-iniciar{background:var(--iniciar)}.s-definir{background:var(--definir)}
  .s-cancel{background:var(--cancel)}

  /* FOOTER */
  .footer{text-align:center;padding:16px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);margin-top:4px}
  .footer a{color:var(--accent);text-decoration:none;font-weight:700}

  /* LOADING / ERROR */
  .loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(138,196,58,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{background:#FFF0F0;border:1px solid #FCA5A5;border-radius:10px;padding:14px;font-size:13px;color:#DC2626;margin:12px}

  /* TAB PANELS */
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* SUMMARY STRIPS */
  .summary-strip{display:flex;gap:6px;padding:0 12px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .summary-strip::-webkit-scrollbar{display:none}
  .strip-item{background:var(--card);border-radius:8px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;min-width:72px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .strip-val{font-size:22px;font-weight:900;line-height:1}
  .strip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="https://pmo-creator.github.io/maz-dashboard/idg-logo.png" onerror="this.style.display='none'" alt="IDG">
  <div class="header-title">
    <h1>MAZ 2026</h1>
    <p id="header-date">Carregando...</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
    <button class="btn-refresh-m" id="btn-refresh" onclick="loadData()">⟳</button>
    <span class="refresh-label" id="refresh-time"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('wbs',this)">📋 Status</div>
  <div class="tab" onclick="switchTab('reqs',this)">📦 Reqs</div>
</div>

<div id="tab-wbs" class="tab-panel active">
  <div class="kpi-section">
    <div class="kpi-hero" id="kpi-hero">
      <div class="kpi-hero-label">Marcos Concluídos</div>
      <div class="kpi-hero-val" id="kpi-pct">–</div>
      <div class="kpi-hero-sub" id="kpi-sub">–</div>
    </div>
    <div class="summary-strip" id="strip"></div>
  </div>
  <div class="section">
    <div class="section-title">Status por Eixo</div>
    <div id="eixo-list"><div class="loading"><div class="spinner"></div><br>Carregando dados...</div></div>
  </div>
</div>

<div id="tab-reqs" class="tab-panel">
  <div class="section" style="padding-top:14px">
    <div class="section-title">Requisições</div>
    <div id="req-list"><div class="loading"><div class="spinner"></div><br>Carregando...</div></div>
  </div>
</div>

<div class="footer">
  <a href="https://pmo-creator.github.io/maz-dashboard/" target="_blank">🖥 Ver versão desktop</a>
  &nbsp;·&nbsp; IDG PMO · MAZ 2026
</div>

<script>
const SHEETS_API_KEY   = 'AIzaSyAayG0UP7kFxt165Zu38BMz0P1hgvGtq18';
const CRONOGRAMA_ID    = '17nttJ_ShqWztvDWH3l59iNqboLqkviZs3_PM5J3ihdA';
const CRONOGRAMA_SHEET = 'cronograma exposição ';
const REQS_SHEET_ID    = '1i0P5ATYf6NiKmS8QpEluAPaASO7gIa0W';
const REQS_SHEET_NAME  = 'Planilha de Status de Compras P';

const STATUS_COLOR = {
  'Feito':'s-feito','Em andamento':'s-andam','Atrasado':'s-atraso',
  'Risco de atraso':'s-risco','A iniciar':'s-iniciar','Definir datas':'s-definir',
  'Cancelado':'s-cancel','Cancelado/Congelado':'s-cancel'
};
const STATUS_RANK = {'Atrasado':0,'Risco de atraso':1,'Em andamento':2,'A iniciar':3,'Definir datas':4,'Feito':5,'Cancelado/Congelado':6,'Cancelado':6};

function sg(row,i){return((row||[])[i]||'').toString().trim().replace(/[\r\n]+/g,' ')}
function fmtDate(d){
  if(!d)return'';d=d.trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.substring(0,10);
  const m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:'';
}
function worstStatus(arr){
  const v=arr.filter(s=>s in STATUS_RANK);
  if(!v.length)return'A iniciar';
  return v.reduce((w,s)=>STATUS_RANK[s]<STATUS_RANK[w]?s:w,'Feito');
}
function statusLabel(s){
  const map={'Feito':'FEITO','Em andamento':'ANDAMENTO','Atrasado':'ATRASADO','Risco de atraso':'RISCO','A iniciar':'A INICIAR','Definir datas':'DEFINIR','Cancelado':'CANCELADO','Cancelado/Congelado':'CONGELADO'};
  return map[s]||s.toUpperCase();
}

async function fetchSheet(id,name){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(name)}!A1:AZ2000?key=${SHEETS_API_KEY}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return(await r.json()).values||[];
}

function parseWBS(rows){
  const CE=1,CG=2,CT=4,CR=6,CS=7;
  const eixoOrder=[],eixoMap={};
  for(const row of rows.slice(2)){
    const eixo=sg(row,CE),grupo=sg(row,CG);
    if(!eixo||!grupo)continue;
    if(!eixoMap[eixo]){eixoMap[eixo]={groupOrder:[],groups:{}};eixoOrder.push(eixo);}
    const em=eixoMap[eixo];
    if(!em.groups[grupo]){em.groups[grupo]={summary:null,statuses:[],resp:''};em.groupOrder.push(grupo);}
    const gm=em.groups[grupo];
    const status=sg(row,CS),resp=sg(row,CR);
    if(sg(row,CT)===grupo){gm.summary={status,resp};}
    else{gm.statuses.push(status);if(!gm.resp)gm.resp=resp;}
  }
  return eixoOrder.map((name,idx)=>{
    const em=eixoMap[name];
    const children=em.groupOrder.map(gName=>{
      const gm=em.groups[gName];
      const status=gm.summary?gm.summary.status:worstStatus(gm.statuses);
      const resp=gm.summary?gm.summary.resp:gm.resp;
      return{name:gName,status,resp};
    });
    return{id:String(idx+1),name,status:worstStatus(children.map(c=>c.status)),children};
  });
}

const REQS_HDR=new Set(['Em andamento','Cotação','Finalizada','Não iniciada','Não inciada','Cancelado','Requisição']);
function parseREQS(rows){
  return rows.slice(2).filter(r=>r&&r.length).map(r=>{
    let req=(r[0]||'').toString().trim();
    if(!req||REQS_HDR.has(req))return null;
    if(/^\d+\.0$/.test(req))req=req.slice(0,-2);
    return{req,comp:(r[2]||'').toString().trim(),desc:(r[5]||'').toString().trim(),status:(r[6]||'').toString().trim(),fin:fmtDate((r[12]||'').toString().trim())};
  }).filter(Boolean);
}

let WBS=[],REQS=[];

function renderKPIs(){
  const all=[],feito=[];
  WBS.forEach(e=>e.children.forEach(g=>{all.push(g.status);if(g.status==='Feito')feito.push(1);}));
  const total=all.length||1;
  const counts={'Feito':0,'Em andamento':0,'Atrasado':0,'Risco de atraso':0,'A iniciar':0,'Definir datas':0};
  all.forEach(s=>{if(s in counts)counts[s]++;});
  const pct=Math.round(feito.length/total*100);
  document.getElementById('kpi-pct').textContent=pct+'%';
  document.getElementById('kpi-sub').textContent=`${feito.length} de ${total} grupos entregues`;
  const strip=document.getElementById('strip');
  const items=[
    {label:'Feito',val:counts['Feito'],cls:'s-feito'},
    {label:'Andamento',val:counts['Em andamento'],cls:'s-andam'},
    {label:'Atrasado',val:counts['Atrasado'],cls:'s-atraso'},
    {label:'Risco',val:counts['Risco de atraso'],cls:'s-risco'},
    {label:'A Iniciar',val:counts['A iniciar'],cls:'s-iniciar'},
    {label:'Sem Data',val:counts['Definir datas'],cls:'s-definir'},
  ];
  strip.innerHTML=items.map(i=>`<div class="strip-item"><span class="strip-val ${i.cls}" style="color:#FFF;background:none">${i.val}</span><span class="strip-label">${i.label}</span></div>`).join('');
}

function renderEixos(){
  const el=document.getElementById('eixo-list');
  if(!WBS.length){el.innerHTML='<div class="loading">Sem dados</div>';return;}
  el.innerHTML=WBS.map((e,idx)=>`
    <div class="eixo-card">
      <div class="eixo-header" onclick="toggleEixo(${idx})">
        <span class="eixo-id">${e.id}</span>
        <span class="eixo-name">${e.name}</span>
        <span class="eixo-status ${STATUS_COLOR[e.status]||'s-iniciar'}">${statusLabel(e.status)}</span>
        <span class="eixo-chev" id="chev-${idx}">▶</span>
      </div>
      <div class="eixo-body" id="body-${idx}">
        ${e.children.map(g=>`
          <div class="grupo-row">
            <span class="grupo-dot ${STATUS_COLOR[g.status]||'s-iniciar'}"></span>
            <div class="grupo-info">
              <div class="grupo-name">${g.name}</div>
              <div class="grupo-meta">
                <span class="grupo-chip ${STATUS_COLOR[g.status]||'s-iniciar'}">${statusLabel(g.status)}</span>
                ${g.resp?`<span class="grupo-resp">${g.resp}</span>`:''}
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleEixo(idx){
  const body=document.getElementById('body-'+idx);
  const chev=document.getElementById('chev-'+idx);
  const open=body.classList.toggle('open');
  chev.style.transform=open?'rotate(90deg)':'';
}

function renderREQS(){
  const el=document.getElementById('req-list');
  if(!REQS.length){el.innerHTML='<div class="loading">Sem dados de requisições</div>';return;}
  const STATUS_REQ_COLOR={
    'Finalizada':'s-feito','Em andamento':'s-andam','Cancelado':'s-cancel',
    'Cotação':'s-risco','Não iniciada':'s-iniciar','Não inciada':'s-iniciar'
  };
  el.innerHTML=REQS.map(r=>`
    <div class="req-card">
      <div class="req-header">
        <span class="req-num">#${r.req}</span>
        <div class="req-info">
          <div class="req-desc">${r.desc||r.comp||'—'}</div>
          <div class="req-comp">${r.comp}</div>
          ${r.fin?`<div class="req-fin">Prazo: ${r.fin}</div>`:''}
        </div>
        <span class="req-status-chip ${STATUS_REQ_COLOR[r.status]||'s-iniciar'}">${r.status||'—'}</span>
      </div>
    </div>`).join('');
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

async function loadData(){
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;btn.textContent='…';
  try{
    const wbsRows=await fetchSheet(CRONOGRAMA_ID,CRONOGRAMA_SHEET);
    WBS.length=0;parseWBS(wbsRows).forEach(e=>WBS.push(e));
    try{
      const reqsRows=await fetchSheet(REQS_SHEET_ID,REQS_SHEET_NAME);
      REQS.length=0;parseREQS(reqsRows).forEach(r=>REQS.push(r));
    }catch(e){console.warn('REQS:',e.message);}
    const now=new Date();
    const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    document.getElementById('header-date').textContent=`${String(now.getDate()).padStart(2,'0')} ${MONTHS[now.getMonth()]} ${now.getFullYear()} · Exposição de Longa Duração`;
    document.getElementById('refresh-time').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    renderKPIs();renderEixos();renderREQS();
  }catch(err){
    document.getElementById('eixo-list').innerHTML=`<div class="error-msg">Erro ao carregar: ${err.message}</div>`;
  }
  btn.disabled=false;btn.textContent='⟳';
}

loadData();
setInterval(loadData,15*60*1000);
</script>
</body>
</html>
