<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MAZ 2026 · Mobile</title>
<style>
  :root{
    --bg:#1E2E0D;--bg2:#2F4A18;--accent:#8AC43A;--accentD:#6BA030;
    --feito:#05C46B;--andam:#1A56FF;--atraso:#FF2525;
    --risco:#FF6B00;--iniciar:#5A6E85;--definir:#92400E;--cancel:#374151;
    --card:#FFFFFF;--surface:#EEF3E8;--text:#1E293B;--muted:#64748B;
    --border:#E2E8F0;--radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding-bottom:40px}

  /* HEADER */
  .header{background:var(--bg);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .header-logo{height:34px;border-radius:3px;flex-shrink:0}
  .header-title h1{font-size:16px;font-weight:800;color:#FFF;line-height:1.1}
  .header-title p{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
  .header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .btn-refresh-m{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#FFF;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-refresh-m:disabled{opacity:.4}
  .refresh-time{font-size:10px;color:rgba(255,255,255,.4)}

  /* TABS */
  .tabs{display:flex;background:var(--bg);border-bottom:2px solid rgba(138,196,58,.3);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:57px;z-index:190}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);padding:10px 14px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;flex-shrink:0}
  .tab.active{color:#FFF;border-bottom-color:var(--accent)}

  /* TAB PANELS */
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* KPI HERO */
  .kpi-hero{background:var(--bg2);padding:16px;text-align:center;border-bottom:2px solid rgba(138,196,58,.2)}
  .kpi-hero-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.55);font-weight:700;margin-bottom:3px}
  .kpi-hero-val{font-size:52px;font-weight:900;color:var(--accent);line-height:1}
  .kpi-hero-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}

  /* KPI STRIP */
  .kpi-strip{display:flex;gap:0;background:var(--bg2);padding:0 10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .kpi-strip::-webkit-scrollbar{display:none}
  .strip-item{display:flex;flex-direction:column;align-items:center;min-width:64px;flex-shrink:0;padding:6px 8px;cursor:pointer;border-radius:8px;transition:background .15s}
  .strip-item.active-filter{background:rgba(255,255,255,.15);outline:2px solid var(--accent)}
  .strip-item:active{background:rgba(255,255,255,.1)}
  .strip-val{font-size:22px;font-weight:900;line-height:1}
  .strip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:rgba(255,255,255,.6);margin-top:2px;text-align:center}
  /* strip colors */
  .sc-feito{color:var(--feito)}.sc-andam{color:#60A5FA}.sc-atraso{color:var(--atraso)}
  .sc-risco{color:var(--risco)}.sc-iniciar{color:#94A3B8}.sc-definir{color:#D97706}
  /* filter all chip */
  .strip-item-all{display:flex;flex-direction:column;align-items:center;min-width:52px;flex-shrink:0;padding:6px 8px;cursor:pointer;border-radius:8px;transition:background .15s}
  .strip-item-all.active-filter{background:rgba(255,255,255,.15);outline:2px solid var(--accent)}
  .strip-all-val{font-size:22px;font-weight:900;color:#FFF;line-height:1}
  .strip-all-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:rgba(255,255,255,.6);margin-top:2px}

  /* EIXO LIST */
  .eixo-section{padding:10px 10px 0}
  .section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px;padding:0 2px}
  .eixo-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .eixo-header{display:flex;align-items:center;gap:8px;padding:12px 12px;cursor:pointer;user-select:none;background:#6BA030;min-height:48px}
  .eixo-id{font-size:14px;font-weight:800;color:#FFF;background:rgba(0,0,0,.2);padding:3px 9px;border-radius:5px;min-width:28px;text-align:center;flex-shrink:0}
  .eixo-name{font-size:13px;font-weight:700;color:#FFF;flex:1;line-height:1.25}
  .eixo-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;color:#FFF;white-space:nowrap;flex-shrink:0}
  .eixo-chev{color:rgba(255,255,255,.7);font-size:11px;transition:transform .25s;flex-shrink:0;width:14px;text-align:center}

  /* GRUPO LIST inside eixo */
  .eixo-body{overflow:hidden;transition:max-height .35s ease;max-height:0}
  .eixo-body.open{max-height:9999px}
  .grupo-item{border-bottom:1px solid var(--border)}
  .grupo-item:last-child{border-bottom:none}
  .grupo-header{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;transition:background .1s;background:#F0F7E8;min-height:44px}
  .grupo-header:active{background:#E0EDD5}
  .grupo-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .grupo-name-wrap{flex:1;min-width:0}
  .grupo-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
  .grupo-resp{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .grupo-chip{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;color:#FFF;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .grupo-chev{color:var(--muted);font-size:10px;transition:transform .2s;flex-shrink:0;margin-top:4px}

  /* MARCO LIST inside grupo */
  .marco-body{overflow:hidden;transition:max-height .3s ease;max-height:0;background:#FAFBFC}
  .marco-body.open{max-height:9999px}
  .marco-item{border-bottom:1px solid #EEF2F6;padding:9px 14px 9px 28px;cursor:pointer}
  .marco-item:last-child{border-bottom:none}
  .marco-row{display:flex;align-items:flex-start;gap:8px}
  .marco-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .marco-info{flex:1;min-width:0}
  .marco-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
  .marco-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center}
  .marco-chip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;color:#FFF;white-space:nowrap}
  .marco-date{font-size:10px;color:var(--muted)}
  .marco-chev{color:var(--muted);font-size:10px;transition:transform .2s;flex-shrink:0;margin-top:2px}

  /* TAREFA LIST inside marco */
  .tarefa-body{overflow:hidden;transition:max-height .3s ease;max-height:0;background:#F8FAFC}
  .tarefa-body.open{max-height:9999px}
  .tarefa-item{padding:8px 12px 8px 36px;border-bottom:1px solid #EEF2F6}
  .tarefa-item:last-child{border-bottom:none}
  .tarefa-header{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
  .tarefa-chip{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;color:#FFF;white-space:nowrap;flex-shrink:0}
  .tarefa-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
  .tarefa-resp{font-size:10px;color:var(--muted);background:#EEF3E8;padding:2px 7px;border-radius:6px;display:inline-block;margin-bottom:4px}
  .tarefa-field{margin-top:5px;border-top:1px solid #EEF2F6;padding-top:5px}
  .tarefa-field-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#0077AA;margin-bottom:2px}
  .tarefa-field-text{font-size:11px;color:var(--text);line-height:1.55;white-space:pre-wrap}

  /* STATUS REPORT TAB */
  .sr-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .sr-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#6BA030;cursor:pointer}
  .sr-eixo-name{font-size:13px;font-weight:700;color:#FFF;flex:1;line-height:1.2}
  .sr-body{overflow:hidden;transition:max-height .3s ease;max-height:0;padding:0}
  .sr-body.open{max-height:9999px}
  .sr-grupo{border-bottom:1px solid var(--border);padding:10px 12px}
  .sr-grupo:last-child{border-bottom:none}
  .sr-grupo-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .sr-field{margin-bottom:6px}
  .sr-field-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#0077AA;margin-bottom:2px}
  .sr-field-text{font-size:12px;color:var(--text);line-height:1.5;white-space:pre-wrap}
  .sr-empty{font-size:11px;color:var(--muted);font-style:italic}

  /* REQS */
  .req-filters{display:flex;gap:6px;padding:10px 10px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .req-filters::-webkit-scrollbar{display:none}
  .req-filter-chip{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .req-filter-chip.active{background:var(--accentD);color:#FFF;border-color:var(--accentD)}
  .req-section{padding:0 10px 0}
  .req-card{background:var(--card);border-radius:10px;margin-bottom:7px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:stretch}
  .req-left-bar{width:4px;flex-shrink:0}
  .req-content{padding:10px 12px;flex:1;min-width:0}
  .req-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
  .req-num{font-size:11px;font-weight:800;color:var(--muted);min-width:28px;flex-shrink:0}
  .req-desc{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;flex:1}
  .req-status-chip{font-size:10px;font-weight:800;padding:3px 9px;border-radius:10px;color:#FFF;white-space:nowrap;flex-shrink:0}
  .req-meta{display:flex;gap:8px;flex-wrap:wrap}
  .req-comp{font-size:10px;color:var(--muted)}
  .req-fin{font-size:10px;color:var(--muted)}

  /* EMPTY STATE */
  .empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:13px}
  .loading{text-align:center;padding:32px 20px;color:var(--muted);font-size:13px}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(138,196,58,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{background:#FFF0F0;border:1px solid #FCA5A5;border-radius:10px;padding:14px;font-size:12px;color:#DC2626;margin:10px}

  /* STATUS COLOR CLASSES */
  .s-feito{background:var(--feito)}.s-andam{background:var(--andam)}.s-atraso{background:var(--atraso)}
  .s-risco{background:var(--risco)}.s-iniciar{background:var(--iniciar)}.s-definir{background:var(--definir)}
  .s-cancel{background:var(--cancel)}

  /* FOOTER */
  .footer{text-align:center;padding:14px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);margin-top:4px}
  .footer a{color:var(--accent);text-decoration:none;font-weight:700}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img class="header-logo" src="https://pmo-creator.github.io/maz-dashboard/idg-logo.png" onerror="this.style.display='none'" alt="IDG">
  <div class="header-title">
    <h1>MAZ 2026</h1>
    <p id="header-date">Carregando...</p>
  </div>
  <div class="header-right">
    <button class="btn-refresh-m" id="btn-refresh" onclick="loadData()">⟳ Atualizar</button>

</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('status',this)">📋 Status</div>
  <div class="tab" onclick="switchTab('report',this)">📊 Status Report</div>
  <div class="tab" onclick="switchTab('reqs',this)">📦 Requisições</div>
</div>

<!-- TAB: STATUS -->
<div id="tab-status" class="tab-panel active">
  <!-- KPI HERO -->
  <div class="kpi-hero">
    <div class="kpi-hero-label">Marcos Concluídos</div>
    <div class="kpi-hero-val" id="kpi-pct">–</div>
    <div class="kpi-hero-sub" id="kpi-sub">–</div>
  </div>
  <!-- KPI STRIP (filtros) -->
  <div class="kpi-strip" id="kpi-strip">
    <div class="strip-item-all active-filter" id="strip-all" onclick="filterStatus(null,this)">
      <span class="strip-all-val" id="strip-total">–</span>
      <span class="strip-all-label">Todos</span>
    </div>
  </div>
  <!-- EIXO LIST -->
  <div class="eixo-section">
    <div class="section-title" id="filter-label">Status por Eixo</div>

</div>

<!-- TAB: STATUS REPORT -->

    <div id="sr-list"><div class="loading"><div class="spinner"></div><br>Carregando...</div></div>
  </div>
</div>

<!-- TAB: REQUISIÇÕES -->
<div id="tab-reqs" class="tab-panel">
  <div class="req-filters" id="req-filters"></div>
  <div class="req-section" id="req-list"><div class="loading"><div class="spinner"></div><br>Carregando...</div></div>
</div>

<div class="footer">
  <a href="https://pmo-creator.github.io/maz-dashboard/" target="_blank">🖥 Ver versão desktop</a>

<script>
const SHEETS_API_KEY   = 'AIzaSyAayG0UP7kFxt165Zu38BMz0P1hgvGtq18';
const CRONOGRAMA_ID    = '17nttJ_ShqWztvDWH3l59iNqboLqkviZs3_PM5J3ihdA';
const CRONOGRAMA_SHEET = 'cronograma exposição ';
const REQS_SHEET_ID    = '1i0P5ATYf6NiKmS8QpEluAPaASO7gIa0W';
const REQS_SHEET_NAME  = 'Planilha de Status de Compras P';

const S_COLOR={'Feito':'s-feito','Em andamento':'s-andam','Atrasado':'s-atraso','Risco de atraso':'s-risco','A iniciar':'s-iniciar','Definir datas':'s-definir','Cancelado':'s-cancel','Cancelado/Congelado':'s-cancel'};
const S_RANK={'Atrasado':0,'Risco de atraso':1,'Em andamento':2,'A iniciar':3,'Definir datas':4,'Feito':5,'Cancelado/Congelado':6,'Cancelado':6};
const S_LABEL={'Feito':'FEITO','Em andamento':'ANDAMENTO','Atrasado':'ATRASADO','Risco de atraso':'RISCO','A iniciar':'A INICIAR','Definir datas':'DEFINIR','Cancelado':'CANCELADO','Cancelado/Congelado':'CONGELADO'};
const STRIP_CFG=[
  {key:'Atrasado',label:'Atrasado',cls:'sc-atraso'},
  {key:'Risco de atraso',label:'Risco',cls:'sc-risco'},
  {key:'Em andamento',label:'Andamento',cls:'sc-andam'},
  {key:'A iniciar',label:'A Iniciar',cls:'sc-iniciar'},
  {key:'Definir datas',label:'Sem Data',cls:'sc-definir'},
  {key:'Feito',label:'Feito',cls:'sc-feito'},
];

function sg(row,i){return((row||[])[i]||'').toString().trim().replace(/[\r\n]+/g,' ')}
function fmtDate(d){
  if(!d)return'';d=d.trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.substring(0,10);
  const m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:'';
}
function worst(arr){const v=arr.filter(s=>s in S_RANK);if(!v.length)return'A iniciar';return v.reduce((w,s)=>S_RANK[s]<S_RANK[w]?s:w,'Feito');}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function fetchSheet(id,name){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(name)}!A1:AZ2000?key=${SHEETS_API_KEY}`;
  const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return(await r.json()).values||[];
}

function findWeekCols(rows){
  const h1=rows[0]||[],h2=rows[1]||[];
  let baseCol=-1;
  for(let i=h1.length-1;i>=0;i--){if(h1[i]&&h1[i].toUpperCase().replace(/Ç/g,'C').replace(/Ã/g,'A').includes('ATUALIZA')){baseCol=i;break;}}
  if(baseCol>=0){
    let pC=-1,eC=-1;
    for(let i=baseCol;i<Math.min(baseCol+5,h2.length);i++){
      const h=(h2[i]||'').toUpperCase();
      if(h.includes('PROGRESSO')&&pC<0)pC=i;
      if(h.includes('ENCAMINHAMENTO')&&eC<0)eC=i;
    }
    if(pC>=0&&eC>=0)return{pC,eC};
    return{pC:baseCol,eC:baseCol+1};
  }
  let eC=-1,pC=-1;
  for(let i=(h2.length-1);i>=0;i--){
    const h=(h2[i]||'').toUpperCase();
    if(h.includes('ENCAMINHAMENTO')&&eC<0)eC=i;
    else if(h.includes('PROGRESSO')&&pC<0&&eC>=0)pC=i;
    if(pC>=0&&eC>=0)break;
  }
  return(pC>=0&&eC>=0)?{pC,eC}:{pC:37,eC:39};
}

function parseWBS(rows){
  const CE=1,CG=2,CM=3,CT=4,CR=6,CS=7,CST=8,CEN=9;
  const {pC,eC}=findWeekCols(rows);
  const eixoOrder=[],eixoMap={};
  for(const row of rows.slice(2)){
    const eixo=sg(row,CE),grupo=sg(row,CG),tarefa=sg(row,CT);
    if(!eixo||!grupo)continue;
    if(!eixoMap[eixo]){eixoMap[eixo]={groupOrder:[],groups:{}};eixoOrder.push(eixo);}
    const em=eixoMap[eixo];
    if(!em.groups[grupo]){em.groups[grupo]={summary:null,marcos:[]};em.groupOrder.push(grupo);}
    const gm=em.groups[grupo];
    const marco=sg(row,CM);
    const obj={tarefa,resp:sg(row,CR),status:sg(row,CS),start:fmtDate(sg(row,CST)),end:fmtDate(sg(row,CEN)),prog:sg(row,pC),enc:sg(row,eC)};
    if(tarefa===grupo){gm.summary=obj;}
    else if(marco&&tarefa===marco){gm.marcos.push({...obj,tipo:'marco',subs:[]});}
    else if(gm.marcos.length&&gm.marcos[gm.marcos.length-1].tipo==='marco'){gm.marcos[gm.marcos.length-1].subs.push(obj);}
    else{gm.marcos.push({tarefa:marco||grupo,tipo:'marco',resp:obj.resp,status:obj.status,start:obj.start,end:obj.end,prog:'',enc:'',subs:[obj]});}
  }
  return eixoOrder.map((name,idx)=>{
    const em=eixoMap[name];
    const children=em.groupOrder.map(gName=>{
      const gm=em.groups[gName],s=gm.summary,marcos=gm.marcos;
      const status=s?s.status:worst(marcos.map(m=>m.status));
      const resp=s?s.resp:(marcos[0]?.resp||'');
      const prog=s?s.prog:'';const enc=s?s.enc:'';
      return{name:gName,status,resp,prog,enc,marcos};
    });
    return{id:String(idx+1),name,status:worst(children.map(c=>c.status)),children};
  });
}

const REQS_HDR=new Set(['Em andamento','Cotação','Finalizada','Não iniciada','Não inciada','Cancelado','Requisição']);
function parseREQS(rows){
  return rows.slice(2).filter(r=>r&&r.length).map(r=>{
    let req=(r[0]||'').toString().trim();
    if(!req||REQS_HDR.has(req))return null;
    if(/^\d+\.0$/.test(req))req=req.slice(0,-2);
    return{req,comp:(r[2]||'').toString().trim(),desc:(r[5]||'').toString().trim(),status:(r[6]||'').toString().trim(),fin:fmtDate((r[12]||'').toString().trim())};
  }).filter(Boolean);
}

let WBS=[],REQS=[],activeStatusFilter=null;

/* ── RENDER KPIs ── */
function renderKPIs(){
  const all=[];
  WBS.forEach(e=>e.children.forEach(g=>all.push(g.status)));
  const total=all.length||1;
  const feito=all.filter(s=>s==='Feito').length;
  const pct=Math.round(feito/total*100);
  document.getElementById('kpi-pct').textContent=pct+'%';
  document.getElementById('kpi-sub').textContent=`${feito} de ${total} grupos entregues`;
  document.getElementById('strip-total').textContent=total;
  const counts={};
  all.forEach(s=>{counts[s]=(counts[s]||0)+1;});
  const strip=document.getElementById('kpi-strip');
  // keep the "Todos" item, rebuild the rest
  const allItem=document.getElementById('strip-all');
  strip.innerHTML='';strip.appendChild(allItem);
  STRIP_CFG.forEach(cfg=>{
    const val=counts[cfg.key]||0;
    const div=document.createElement('div');
    div.className='strip-item';
    div.id='strip-'+cfg.key;
    div.innerHTML=`<span class="strip-val ${cfg.cls}">${val}</span><span class="strip-label">${cfg.label}</span>`;
    div.onclick=()=>filterStatus(cfg.key,div);
    strip.appendChild(div);
  });
}

/* ── FILTER ── */
function filterStatus(status,el){
  activeStatusFilter=status;
  document.querySelectorAll('.strip-item,.strip-item-all').forEach(e=>e.classList.remove('active-filter'));
  el.classList.add('active-filter');
  const lbl=document.getElementById('filter-label');
  lbl.textContent=status?`Filtro: ${S_LABEL[status]||status}`:'Status por Eixo';
  renderEixos();
}

/* ── RENDER EIXOS ── */
function renderEixos(){
  const el=document.getElementById('eixo-list');
  const data=activeStatusFilter
    ?WBS.map(e=>({...e,children:e.children.filter(g=>g.status===activeStatusFilter)})).filter(e=>e.children.length)
    :WBS;
  if(!data.length){el.innerHTML='<div class="empty">Nenhum grupo com esse status.</div>';return;}
  el.innerHTML=data.map((e,ei)=>`
    <div class="eixo-card">
      <div class="eixo-header" onclick="toggleEixo('e${ei}')">
        <span class="eixo-id">${e.id}</span>
        <span class="eixo-name">${escHtml(e.name)}</span>
        <span class="eixo-chip ${S_COLOR[e.status]||'s-iniciar'}">${S_LABEL[e.status]||e.status}</span>
        <span class="eixo-chev" id="ec-e${ei}">▶</span>
      </div>
      <div class="eixo-body" id="eb-e${ei}">
        ${e.children.map((g,gi)=>{
          const gKey=`e${ei}g${gi}`;
          return`<div class="grupo-item">
            <div class="grupo-header" onclick="toggleGrupo('${gKey}')">
              <span class="grupo-dot ${S_COLOR[g.status]||'s-iniciar'}"></span>
              <div class="grupo-name-wrap">
                <div class="grupo-name">${escHtml(g.name)}</div>
                ${g.resp?`<div class="grupo-resp">${escHtml(g.resp)}</div>`:''}
              </div>
              <span class="grupo-chip ${S_COLOR[g.status]||'s-iniciar'}">${S_LABEL[g.status]||g.status}</span>
              <span class="grupo-chev" id="gc-${gKey}">▶</span>
            </div>
            <div class="marco-body" id="gb-${gKey}">
              ${g.marcos.length?g.marcos.map((m,mi)=>{
                const mKey=`${gKey}m${mi}`;
                return`<div class="marco-item">
                  <div class="marco-row" onclick="toggleMarco('${mKey}')">
                    <span class="marco-dot ${S_COLOR[m.status]||'s-iniciar'}"></span>
                    <div class="marco-info">
                      <div class="marco-name">${escHtml(m.tarefa)}</div>
                      <div class="marco-meta">
                        <span class="marco-chip ${S_COLOR[m.status]||'s-iniciar'}">${S_LABEL[m.status]||m.status}</span>
                        ${m.end?`<span class="marco-date">até ${m.end}</span>`:''}
                      </div>
                    </div>
                    ${m.subs.length?`<span class="marco-chev" id="mc-${mKey}">▶</span>`:''}
                  </div>
                  ${m.subs.length?`<div class="tarefa-body" id="mb-${mKey}">
                    ${m.subs.map(t=>`<div class="tarefa-item">
                      <div class="tarefa-header">
                        <span class="tarefa-chip ${S_COLOR[t.status]||'s-iniciar'}">${S_LABEL[t.status]||t.status}</span>
                        <span class="tarefa-name">${escHtml(t.tarefa)}</span>
                      </div>
                      ${t.resp?`<span class="tarefa-resp">${escHtml(t.resp)}</span>`:''}
                      ${t.prog?`<div class="tarefa-field"><div class="tarefa-field-label">Progresso</div><div class="tarefa-field-text">${escHtml(t.prog)}</div></div>`:''}
                      ${t.enc?`<div class="tarefa-field"><div class="tarefa-field-label">Encaminhamento</div><div class="tarefa-field-text">${escHtml(t.enc)}</div></div>`:''}
                    </div>`).join('')}
                  </div>`:''}
                </div>`;
              }).join(''):'<div class="empty" style="padding:10px 12px;font-size:11px">Sem marcos cadastrados</div>'}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function toggleEixo(key){
  const b=document.getElementById('eb-'+key),c=document.getElementById('ec-'+key);
  const o=b.classList.toggle('open');c.style.transform=o?'rotate(90deg)':'';
}
function toggleGrupo(key){
  const b=document.getElementById('gb-'+key),c=document.getElementById('gc-'+key);
  const o=b.classList.toggle('open');c.style.transform=o?'rotate(90deg)':'';
}
function toggleMarco(key){
  const b=document.getElementById('mb-'+key);if(!b)return;
  const c=document.getElementById('mc-'+key);
  const o=b.classList.toggle('open');if(c)c.style.transform=o?'rotate(90deg)':'';
}

/* ── STATUS REPORT ── */
function renderStatusReport(){
  const el=document.getElementById('sr-list');
  if(!WBS.length){el.innerHTML='<div class="empty">Sem dados</div>';return;}
  el.innerHTML=WBS.map((e,ei)=>`
    <div class="sr-card">
      <div class="sr-header" onclick="toggleSR('sr${ei}')">
        <span class="eixo-id" style="font-size:13px">${e.id}</span>
        <span class="sr-eixo-name">${escHtml(e.name)}</span>
        <span class="eixo-chip ${S_COLOR[e.status]||'s-iniciar'}">${S_LABEL[e.status]||e.status}</span>
        <span class="eixo-chev" id="src-sr${ei}">▶</span>
      </div>
      <div class="sr-body" id="srb-sr${ei}">
        ${e.children.map(g=>{
          const hasProg=g.prog&&g.prog.trim();
          const hasEnc=g.enc&&g.enc.trim();
          const taskProgs=g.marcos.flatMap(m=>m.subs.filter(t=>t.prog||t.enc));
          if(!hasProg&&!hasEnc&&!taskProgs.length)return`<div class="sr-grupo"><div class="sr-grupo-name"><span class="grupo-dot ${S_COLOR[g.status]||'s-iniciar'}" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></span>${escHtml(g.name)}</div><div class="sr-empty">Sem atualizações desta semana</div></div>`;
          return`<div class="sr-grupo">
            <div class="sr-grupo-name"><span class="grupo-dot ${S_COLOR[g.status]||'s-iniciar'}" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></span>${escHtml(g.name)}</div>
            ${hasProg?`<div class="sr-field"><div class="sr-field-label">Progresso</div><div class="sr-field-text">${escHtml(g.prog)}</div></div>`:''}
            ${hasEnc?`<div class="sr-field"><div class="sr-field-label">Encaminhamento</div><div class="sr-field-text">${escHtml(g.enc)}</div></div>`:''}
            ${taskProgs.map(t=>`
              <div class="sr-field" style="margin-top:6px;border-top:1px dashed #E2E8F0;padding-top:6px">
                <div class="sr-field-label" style="color:var(--muted)">${escHtml(t.tarefa)}</div>
                ${t.prog?`<div class="sr-field"><div class="sr-field-label">Progresso</div><div class="sr-field-text">${escHtml(t.prog)}</div></div>`:''}
                ${t.enc?`<div class="sr-field"><div class="sr-field-label">Encaminhamento</div><div class="sr-field-text">${escHtml(t.enc)}</div></div>`:''}
              </div>`).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}
function toggleSR(key){
  const b=document.getElementById('srb-'+key),c=document.getElementById('src-'+key);
  const o=b.classList.toggle('open');c.style.transform=o?'rotate(90deg)':'';
}

/* ── REQUISIÇÕES ── */
const REQ_STATUS_COLORS={'Finalizada':'s-feito','Em andamento':'s-andam','Cancelado':'s-cancel','Cotação':'s-risco','Não iniciada':'s-iniciar','Não inciada':'s-iniciar'};
let activeReqFilter='Todos';
function renderReqs(){
  const filters=document.getElementById('req-filters');
  const statuses=['Todos',...new Set(REQS.map(r=>r.status).filter(Boolean))];
  filters.innerHTML=statuses.map(s=>`<div class="req-filter-chip${s===activeReqFilter?' active':''}" onclick="filterReq('${s}',this)">${s}</div>`).join('');
  const el=document.getElementById('req-list');
  const data=activeReqFilter==='Todos'?REQS:REQS.filter(r=>r.status===activeReqFilter);
  if(!data.length){el.innerHTML='<div class="empty">Sem requisições</div>';return;}
  el.innerHTML=data.map(r=>`
    <div class="req-card">
      <div class="req-left-bar ${REQ_STATUS_COLORS[r.status]||'s-iniciar'}"></div>
      <div class="req-content">
        <div class="req-top">
          <span class="req-num">#${r.req}</span>
          <span class="req-desc">${escHtml(r.desc||r.comp||'—')}</span>
          <span class="req-status-chip ${REQ_STATUS_COLORS[r.status]||'s-iniciar'}">${escHtml(r.status)||'—'}</span>
        </div>
        <div class="req-meta">
          ${r.comp?`<span class="req-comp">${escHtml(r.comp)}</span>`:''}
          ${r.fin?`<span class="req-fin">📅 ${r.fin}</span>`:''}
        </div>
      </div>
    </div>`).join('');
}
function filterReq(status,el){
  activeReqFilter=status;
  document.querySelectorAll('.req-filter-chip').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderReqs();
}

/* ── TAB SWITCH ── */
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

/* ── LOAD DATA ── */
async function loadData(){
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;btn.textContent='…';
  try{
    const wbsRows=await fetchSheet(CRONOGRAMA_ID,CRONOGRAMA_SHEET);
    WBS.length=0;parseWBS(wbsRows).forEach(e=>WBS.push(e));
    try{
      const reqsRows=await fetchSheet(REQS_SHEET_ID,REQS_SHEET_NAME);
      REQS.length=0;parseREQS(reqsRows).forEach(r=>REQS.push(r));
    }catch(e){console.warn('REQS:',e.message);}
    const now=new Date();
    const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    document.getElementById('header-date').textContent=`${String(now.getDate()).padStart(2,'0')} ${MONTHS[now.getMonth()]} ${now.getFullYear()} · MAZ ELD`;
    document.getElementById('refresh-time').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    renderKPIs();renderEixos();renderStatusReport();renderReqs();
  }catch(err){
    document.getElementById('eixo-list').innerHTML=`<div class="error-msg">Erro: ${escHtml(err.message)}</div>`;
  }
  btn.disabled=false;btn.textContent='⟳ Atualizar';
}

loadData();
setInterval(loadData,15*60*1000);
</script>
